<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>LinkedIn Game Solver</title>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-icon">
        <img src="../icons/logo.png" alt="Logo">
      </div>
      <div class="header-text">
        <h1>Game Solver</h1>
        <p class="subtitle">Pick a game to auto-solve</p>
      </div>
    </div>

    <div class="games">
      <button class="game-card" data-game="sudoku">
        <div class="game-icon"><img src="../icons/sudoku.png" alt="Sudoku"></div>
        <div class="game-info">
          <span class="game-name">Mini Sudoku</span>
          <span class="game-desc">6x6 number grid</span>
        </div>
        <div class="game-arrow">&#8250;</div>
      </button>

      <button class="game-card" data-game="tango">
        <div class="game-icon"><img src="../icons/tango.png" alt="Tango"></div>
        <div class="game-info">
          <span class="game-name">Tango</span>
          <span class="game-desc">Suns & moons puzzle</span>
        </div>
        <div class="game-arrow">&#8250;</div>
      </button>

      <button class="game-card" data-game="queens">
        <div class="game-icon"><img src="../icons/queens.png" alt="Queens"></div>
        <div class="game-info">
          <span class="game-name">Queens</span>
          <span class="game-desc">Place the queens</span>
        </div>
        <div class="game-arrow">&#8250;</div>
      </button>

      <button class="game-card" data-game="zip">
        <div class="game-icon"><img src="../icons/zip.png" alt="Zip"></div>
        <div class="game-info">
          <span class="game-name">Zip</span>
          <span class="game-desc">Connect the path</span>
        </div>
        <div class="game-arrow">&#8250;</div>
      </button>

      <button class="game-card" data-game="patches">
        <div class="game-icon"><img src="../icons/patches.png" alt="Patches"></div>
        <div class="game-info">
          <span class="game-name">Patches</span>
          <span class="game-desc">Fill the grid with shapes</span>
        </div>
        <div class="game-arrow">&#8250;</div>
      </button>
    </div>

    <div id="status" class="status hidden">
      <div class="status-icon" id="status-icon">&#9203;</div>
      <span id="status-text"></span>
    </div>

    <div class="footer">
      <button id="debug-btn">Diagnostics</button>
      <span>v1.4</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
